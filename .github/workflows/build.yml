name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Flutter version check
        run: flutter --version

      - name: Generate Android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.edutrack --project-name edutrack_parent .

      - name: Disable minify/shrink
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle

      - name: Add INTERNET permission
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' \
            android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: List APK outputs
        run: find build/app/outputs -name '*.apk' | sort

      - name: Upload arm64 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-parent-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          name: EduTrack Parent ${{ github.ref_name }}
          body: |
            ## EduTrack Parent App ${{ github.ref_name }}

            ### Install on your Android phone
            1. Download `app-arm64-v8a-release.apk` (most modern phones)
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK

            ### Features
            - 📋 View child's daily attendance
            - 📊 View test results & marks
            - 📚 See homework & work logs from teachers
            - 🔔 Receive notifications from school
            - 👨‍👩‍👧 Multi-child support across schools
