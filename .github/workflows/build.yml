name: Build Dev APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build Dev APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable

      - name: Generate Android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.edutrack.dev --project-name edutrack_parent .

      - name: Set app label to Parent (Dev)
        run: |
          sed -i 's/android:label="edutrack_parent"/android:label="Parent (Dev)"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Disable minify/shrink
        run: |
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle

      - name: Add permissions
        run: |
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' \
            android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>' \
            android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.VIBRATE"/>' \
            android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' \
            android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Patch build.gradle for Firebase
        run: |
          # Root build.gradle — add google-services classpath
          sed -i "/dependencies {/a\\        classpath 'com.google.gms:google-services:4.4.2'" \
            android/build.gradle
          # App build.gradle — apply the plugin
          echo "" >> android/app/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Write google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            # Stub file — allows build to succeed; push won't work until real file is added
            cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "project-b7d6b5f8-fe9f-49fd-acb",
              "storage_bucket": "project-b7d6b5f8-fe9f-49fd-acb.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                "android_client_info": {
                  "package_name": "com.edutrack.dev.edutrack_parent"
                }
              },
              "oauth_client": [],
              "api_key": [{"current_key": "stub-replace-with-real-key"}],
              "services": {"appinvite_service": {"other_platform_oauth_client": []}}
            }],
            "configuration_version": "1"
          }
          EOF
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (dart type-check)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: List APK outputs
        run: find build/app/outputs -name '*.apk' | sort

      - name: Upload DEV arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-parent-DEV-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
