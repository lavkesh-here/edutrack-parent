name: edutrack_parent
description: EduTrack Parent App — attendance, results, work logs, notifications.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  google_fonts: ^6.1.0
  url_launcher: ^6.3.1
  pdf: ^3.10.0
  printing: ^5.12.0
  image_picker: ^1.1.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
